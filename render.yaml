databases:
  - name: ai-finance-db
    databaseName: ai_finance
    user: ai_finance_user
    plan: free

services:
  - type: web
    name: ai-personal-finance
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --workers 2 --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings_prod
      - key: DATABASE_URL
        fromDatabase:
          name: ai-finance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@finance.pk
      - key: ADMIN_PASSWORD
        value: Admin@2026!
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
